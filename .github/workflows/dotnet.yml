# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies and build
      working-directory: ./server/src/TelemetryIngestionCore.Api
      run: |
        dotnet restore
        dotnet build --no-restore
    - name: Test
      working-directory: ./server/src/TelemetryIngestionCore.Tests
      run: |
        dotnet restore
        dotnet build
        dotnet test --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults
    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: 'Test Results'
        path: './server/src/TelemetryIngestionCore.Tests/TestResults/*.trx'
        reporter: dotnet-trx
